[build]
  publish = "dist"
  command = "npm run build"

[dev]
  command    = "npm run dev"
  targetPort = 3000
  port       = 8888
  autoLaunch = false

# React Router — serve index.html for all routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Netlify Identity — required for Decap CMS admin login
[template.environment]
  NETLIFY_IDENTITY = "true"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options                  = "SAMEORIGIN"
    X-Content-Type-Options           = "nosniff"
    Referrer-Policy                  = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy       = "same-origin"
    Permissions-Policy               = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security        = "max-age=31536000; includeSubDomains"
    Content-Security-Policy          = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://identity.netlify.com https://api.twilio.com; frame-ancestors 'none'"
